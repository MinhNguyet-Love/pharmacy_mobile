name: pharmacy_mobile
description: "Mobile app bản đồ nhà thuốc Việt Nam (Pharmacy Map)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  flutter_map_marker_cluster: ^1.3.6
  url_launcher: ^6.3.0
  geolocator: ^14.0.2
  flutter_map_heatmap: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

dependency_overrides:
  package_info_plus: 8.3.0

flutter:
  uses-material-design: true